<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flappy Bird</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #111827;
      border: 1px solid #2a3a5a;
      border-radius: 10px;
      padding: 6px 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 310px;
    }

    .tb-btn {
      background: #1e2d42;
      border: 1px solid #2e4a70;
      color: #8ab4f8;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .tb-btn:hover { background: #2a4060; color: #fff; }
    .tb-btn.active { background: #1a4080; color: #fff; border-color: #4a8aff; }

    .tb-sep {
      width: 1px; height: 22px;
      background: #2a3a5a;
      margin: 0 2px;
    }

    #fps-counter {
      font-size: 12px;
      color: #4ade80;
      background: #0a1a0a;
      border: 1px solid #1a4a1a;
      border-radius: 6px;
      padding: 4px 8px;
      min-width: 62px;
      text-align: center;
      font-family: monospace;
    }

    #speed-label {
      font-size: 12px;
      color: #facc15;
      min-width: 36px;
      text-align: center;
    }

    /* ── Canvas wrapper ── */
    #game-wrap {
      position: relative;
      line-height: 0;
    }

    canvas {
      display: block;
      border-radius: 4px;
    }

    /* Fullscreen tweaks */
    :fullscreen #toolbar { display: none; }
    :fullscreen body { justify-content: center; }

    /* ── Hint bar ── */
    #hint {
      margin-top: 8px;
      color: #4a5a7a;
      font-size: 11px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>

  <!-- ── Toolbar ── -->
  <div id="toolbar">
    <!-- FPS -->
    <div id="fps-counter">-- FPS</div>

    <div class="tb-sep"></div>

    <!-- Pause -->
    <button class="tb-btn" id="btn-pause" title="Pause / Resume (P)">⏸ Pause</button>

    <!-- Mute -->
    <button class="tb-btn" id="btn-mute" title="Mute / Unmute (M)">🔊 Sound</button>

    <div class="tb-sep"></div>

    <!-- Speed -->
    <button class="tb-btn" id="btn-slower" title="Slower">◀ Slow</button>
    <span id="speed-label">1×</span>
    <button class="tb-btn" id="btn-faster" title="Faster">Fast ▶</button>

    <div class="tb-sep"></div>

    <!-- Fullscreen -->
    <button class="tb-btn" id="btn-fs" title="Fullscreen (F)">⛶ Full</button>
  </div>

  <!-- ── Game canvas lives here ── -->
  <div id="game-wrap"></div>

  <p id="hint">
    🎮 PS: ✕ flap · △ menu &nbsp;|&nbsp; 🖥 PC: Space / ↑ &nbsp;|&nbsp; 📱 Tap · F = Fullscreen · P = Pause
  </p>

<script src="script.js"></script>
<script>
// ── Toolbar controller (runs after Phaser boots) ──────────────────────────
window.addEventListener('load', () => {
  // Move canvas into wrapper
  const canvas = document.querySelector('canvas');
  if (canvas) document.getElementById('game-wrap').appendChild(canvas);

  // ── FPS ──────────────────────────────────────────────────────────────────
  const fpsEl = document.getElementById('fps-counter');
  let fpsFrames = 0, fpsLast = performance.now();
  function fpsLoop() {
    fpsFrames++;
    const now = performance.now();
    if (now - fpsLast >= 500) {
      const fps = Math.round(fpsFrames / ((now - fpsLast) / 1000));
      const color = fps >= 55 ? '#4ade80' : fps >= 40 ? '#facc15' : '#f87171';
      fpsEl.style.color = color;
      fpsEl.textContent = fps + ' FPS';
      fpsFrames = 0;
      fpsLast = now;
    }
    requestAnimationFrame(fpsLoop);
  }
  requestAnimationFrame(fpsLoop);

  // ── Pause ─────────────────────────────────────────────────────────────────
  let paused = false;
  const btnPause = document.getElementById('btn-pause');
  function togglePause() {
    paused = !paused;
    if (window._phaserGame) {
      if (paused) window._phaserGame.loop.sleep();
      else         window._phaserGame.loop.wake();
    }
    btnPause.textContent = paused ? '▶ Resume' : '⏸ Pause';
    btnPause.classList.toggle('active', paused);
  }
  btnPause.addEventListener('click', togglePause);

  // ── Mute ─────────────────────────────────────────────────────────────────
  let muted = false;
  const btnMute = document.getElementById('btn-mute');
  function toggleMute() {
    muted = !muted;
    if (window._phaserGame) {
      window._phaserGame.sound.mute = muted;
    }
    btnMute.textContent = muted ? '🔇 Muted' : '🔊 Sound';
    btnMute.classList.toggle('active', muted);
  }
  btnMute.addEventListener('click', toggleMute);

  // ── Speed ─────────────────────────────────────────────────────────────────
  const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
  let speedIdx = 2; // default 1×
  const speedLabel = document.getElementById('speed-label');

  function applySpeed() {
    const s = speeds[speedIdx];
    speedLabel.textContent = s + '×';
    if (window._phaserGame) {
      window._phaserGame.loop.targetFps = Math.round(60 * s);
      // timeScale affects Phaser timers and tweens
      window._phaserGame.scene.scenes.forEach(sc => {
        if (sc.time) sc.time.timeScale = s;
        if (sc.physics && sc.physics.world) sc.physics.world.timeScale = 1 / s;
      });
      // Store globally so GameScene can read it
      window._gameSpeed = s;
    }
  }

  document.getElementById('btn-slower').addEventListener('click', () => {
    if (speedIdx > 0) { speedIdx--; applySpeed(); }
  });
  document.getElementById('btn-faster').addEventListener('click', () => {
    if (speedIdx < speeds.length - 1) { speedIdx++; applySpeed(); }
  });

  // ── Fullscreen ────────────────────────────────────────────────────────────
  const btnFs = document.getElementById('btn-fs');
  function toggleFS() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
      btnFs.textContent = '✕ Exit Full';
      btnFs.classList.add('active');
    } else {
      document.exitFullscreen();
      btnFs.textContent = '⛶ Full';
      btnFs.classList.remove('active');
    }
  }
  btnFs.addEventListener('click', toggleFS);
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      btnFs.textContent = '⛶ Full';
      btnFs.classList.remove('active');
    }
  });

  // ── Keyboard shortcuts ────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') toggleFS();
    if (e.key === 'p' || e.key === 'P') togglePause();
    if (e.key === 'm' || e.key === 'M') toggleMute();
  });
});
</script>
</body>
</html>
